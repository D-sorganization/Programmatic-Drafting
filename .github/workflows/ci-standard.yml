name: CI Standard

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check src tests
      - name: Check formatting
        run: black --check src tests
      - name: Type check
        run: mypy src tests --ignore-missing-imports

  tests:
    needs: quality-gate
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Test suite
        run: pytest --cov=src --cov-report=xml
      - name: Build default STEP artifact
        run: python -m programmatic_drafting.cli export-electrode-advisor-default
      - name: Build cylindrical bath STEP artifact
        run: python -m programmatic_drafting.cli export-cylindrical-bath-layout
      - name: Build vessel drafter STEP artifact
        run: python -m programmatic_drafting.cli export-vessel-drafter-default
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: programmatic-drafting-step-artifacts
          path: |
            generated/electrode_advisor_default/electrode_advisor_default_layout.step
            generated/electrode_advisor_default/electrode_advisor_default_layout.json
            generated/cylindrical_bath_layout/cylindrical_bath_layout.step
            generated/cylindrical_bath_layout/cylindrical_bath_layout.json
            generated/vessel_drafter_default/vessel_drafter_default.step
            generated/vessel_drafter_default/vessel_drafter_default.json
          retention-days: 30
