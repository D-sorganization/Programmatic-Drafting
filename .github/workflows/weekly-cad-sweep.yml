name: Weekly CAD Sweep

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-cad-sweep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate-artifacts:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Export default electrode advisor layout
        run: python -m programmatic_drafting.cli export-electrode-advisor-default
      - name: Export cylindrical bath layout
        run: python -m programmatic_drafting.cli export-cylindrical-bath-layout
      - name: Export vessel drafter layout
        run: python -m programmatic_drafting.cli export-vessel-drafter-default
      - name: Upload weekly artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-programmatic-drafting-artifacts
          path: |
            generated/electrode_advisor_default/electrode_advisor_default_layout.step
            generated/electrode_advisor_default/electrode_advisor_default_layout.json
            generated/cylindrical_bath_layout/cylindrical_bath_layout.step
            generated/cylindrical_bath_layout/cylindrical_bath_layout.json
            generated/vessel_drafter_default/vessel_drafter_default.step
            generated/vessel_drafter_default/vessel_drafter_default.json
          retention-days: 30
